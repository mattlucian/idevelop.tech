version: 2

# Dependabot version updates are intentionally disabled.
# Dependency bumps are handled manually on a periodic review cadence to
# reduce PR noise and batch low-priority updates with deliberate review.
#
# This file is kept (rather than deleted) so the disabled state is
# discoverable and the previous ecosystem configs are recoverable from
# git history if version updates are ever re-enabled.
#
# Unaffected (these remain active and are controlled via
# Settings → Security, not this file):
#   - Dependabot alerts (vulnerability notifications)
#   - Dependabot security updates (auto-PRs for CVE fixes)
updates: []
